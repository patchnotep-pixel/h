<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커스텀 뽁뽁이</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#eef4ff;
    user-select:none;
}

header{
    padding:15px;
    background:white;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.settings{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
}

input[type=number]{
    width:100px;
}

button{
    padding:8px 14px;
    cursor:pointer;
}

#score{
    padding:15px;
    font-size:22px;
    text-align:center;
}

#combo{
    font-size:32px;
    font-weight:bold;
    text-align:center;
    color:#ff6600;
    margin-bottom:10px;
}

.combo-pop{
    animation:comboPop .15s;
}

@keyframes comboPop{
    0%{transform:scale(1);}
    50%{transform:scale(1.25);}
    100%{transform:scale(1);}
}

.wrap{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(45px,1fr));
    gap:8px;
    padding:15px;
}

.bubble{
    aspect-ratio:1;
    border-radius:50%;
    background:
        radial-gradient(circle at 30% 30%,
        #fff,#cfe6ff,#8dc4ff);
    box-shadow:
        inset 0 0 10px rgba(255,255,255,.9),
        0 3px 8px rgba(0,0,0,.15);
    transition:.08s;
}

.bubble:hover{
    transform:scale(1.05);
}

.popped{
    background:#cfcfcf;
    transform:scale(.75);
    box-shadow:none;
}
</style>
</head>
<body>

<header>
<div class="settings">

<label>
🫧 개수:
<input id="countInput" type="number" value="300" min="10" max="5000">
</label>

<label>
🔊 소리:
<input id="soundInput" type="file" accept="audio/*">
</label>

<label>
🎨 배경색:
<input type="color" id="bgColor" value="#eef4ff">
</label>

<label>
📳 진동:
<input type="checkbox" id="vibration" checked>
</label>

<label>
⏱ 진동(ms):
<input type="number" id="vibrationTime" value="10">
</label>

<button id="applyBtn">
적용
</button>

</div>
</header>

<div id="score">
터뜨린 개수: 0
</div>

<div id="combo">
콤보 x0
</div>

<div id="wrap" class="wrap"></div>

<script>
const wrap = document.getElementById("wrap");
const scoreText = document.getElementById("score");
const comboText = document.getElementById("combo");

let score = 0;
let mouseDown = false;
let customSound = null;
let combo = 0;
let comboTimer;
let audioContext;

document.addEventListener("mousedown",()=>{ mouseDown=true; });
document.addEventListener("mouseup",()=>{ mouseDown=false; });

document.getElementById("soundInput").addEventListener("change",(e)=>{
    const file = e.target.files[0];
    if(file){
        customSound = URL.createObjectURL(file);
    }
});

function playPop(){
    if(customSound){
        const audio = new Audio(customSound);
        audio.volume = 0.8;
        audio.play().catch(()=>{});
        return;
    }

    // 기본 팝 소리
    if(!audioContext){
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    try {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        const filter = audioContext.createBiquadFilter();

        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(180, audioContext.currentTime);
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(800, audioContext.currentTime);

        gain.gain.setValueAtTime(0.6, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.12);

        oscillator.connect(filter);
        filter.connect(gain);
        gain.connect(audioContext.destination);

        oscillator.start();
        oscillator.stop(audioContext.currentTime + 0.15);
    } catch(e) {}
}

function popBubble(bubble){
    if(bubble.classList.contains("popped")) return;

    bubble.classList.add("popped");

    combo++;
    clearTimeout(comboTimer);

    comboTimer = setTimeout(()=>{
        combo = 0;
        comboText.textContent = "콤보 x0";
    },1000);

    comboText.textContent = `콤보 x${combo}`;
    comboText.classList.remove("combo-pop");
    void comboText.offsetWidth;
    comboText.classList.add("combo-pop");

    score++;
    scoreText.textContent = `터뜨린 개수: ${score}`;

    const vibrationEnabled = document.getElementById("vibration").checked;
    const vibrationTime = Number(document.getElementById("vibrationTime").value);

    if(vibrationEnabled && navigator.vibrate){
        navigator.vibrate(vibrationTime);
    }

    playPop();

    bubble.animate([
        {transform:"scale(1)"},
        {transform:"scale(1.2)"},
        {transform:"scale(0.75)"}
    ],{ duration:120 });

    if(combo >= 50){
        document.body.animate([
            {transform:"translateX(-5px)"},
            {transform:"translateX(5px)"},
            {transform:"translateX(0px)"}
        ],{ duration:100 });
    }
}

function createBubbles(count){
    wrap.innerHTML = "";
    score = 0;
    combo = 0;
    comboText.textContent = "콤보 x0";
    scoreText.textContent = "터뜨린 개수: 0";

    for(let i=0;i<count;i++){
        const bubble = document.createElement("div");
        bubble.className = "bubble";

        bubble.addEventListener("mousedown", ()=>popBubble(bubble));
        bubble.addEventListener("mouseenter", ()=>{
            if(mouseDown) popBubble(bubble);
        });

        wrap.appendChild(bubble);
    }
}

document.getElementById("applyBtn").addEventListener("click",()=>{
    let count = parseInt(document.getElementById("countInput").value);
    if(isNaN(count)) count = 300;
    count = Math.max(10, Math.min(5000, count));

    document.body.style.background = document.getElementById("bgColor").value;
    createBubbles(count);
});

document.addEventListener("touchstart",()=>{ mouseDown = true; });
document.addEventListener("touchend",()=>{ mouseDown = false; });

createBubbles(300);
</script>

</body>
</html>
